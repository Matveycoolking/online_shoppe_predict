<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Покупательское намерение</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="intro">
        <div>
          <p class="eyebrow">ML demo</p>
          <h1>Покупательское намерение в интернет-магазине</h1>
          <p class="lead">
            Введите параметры пользовательской сессии, чтобы получить прогноз покупки и вероятность положительного класса.
          </p>
        </div>
        <div class="status-note">Backend: http://127.0.0.1:8000</div>
      </section>

      <section class="workspace">
        <form id="prediction-form" class="form-panel">
          <div class="form-grid">
            <label>
              Административные страницы
              <input name="Administrative" type="number" step="1" value="1" required />
            </label>
            <label>
              Время на административных страницах
              <input name="Administrative_Duration" type="number" step="0.1" value="20.5" required />
            </label>
            <label>
              Информационные страницы
              <input name="Informational" type="number" step="1" value="0" required />
            </label>
            <label>
              Время на информационных страницах
              <input name="Informational_Duration" type="number" step="0.1" value="0.0" required />
            </label>
            <label>
              Страницы товаров
              <input name="ProductRelated" type="number" step="1" value="5" required />
            </label>
            <label>
              Время на страницах товаров
              <input name="ProductRelated_Duration" type="number" step="0.1" value="120.0" required />
            </label>
            <label>
              Доля отказов
              <input name="BounceRates" type="number" step="0.001" min="0" value="0.02" required />
            </label>
            <label>
              Доля выходов
              <input name="ExitRates" type="number" step="0.001" min="0" value="0.05" required />
            </label>
            <label>
              Ценность страниц
              <input name="PageValues" type="number" step="0.1" value="10.0" required />
            </label>
            <label>
              Близость к празднику
              <input name="SpecialDay" type="number" step="0.1" min="0" max="1" value="0.0" required />
            </label>
            <label>
              Месяц
              <select name="Month" required>
                <option value="Feb">Feb</option>
                <option value="Mar">Mar</option>
                <option value="May">May</option>
                <option value="June">June</option>
                <option value="Jul">Jul</option>
                <option value="Aug">Aug</option>
                <option value="Sep">Sep</option>
                <option value="Oct">Oct</option>
                <option value="Nov" selected>Nov</option>
                <option value="Dec">Dec</option>
              </select>
            </label>
            <label>
              Операционная система
              <input name="OperatingSystems" type="number" step="1" value="2" required />
            </label>
            <label>
              Браузер
              <input name="Browser" type="number" step="1" value="2" required />
            </label>
            <label>
              Регион
              <input name="Region" type="number" step="1" value="1" required />
            </label>
            <label>
              Тип трафика
              <input name="TrafficType" type="number" step="1" value="3" required />
            </label>
            <label>
              Тип посетителя
              <select name="VisitorType" required>
                <option value="Returning_Visitor" selected>Returning_Visitor</option>
                <option value="New_Visitor">New_Visitor</option>
                <option value="Other">Other</option>
              </select>
            </label>
            <label>
              Выходной день
              <select name="Weekend" required>
                <option value="false" selected>false</option>
                <option value="true">true</option>
              </select>
            </label>
          </div>

          <button type="submit" id="submit-button">Предсказать</button>
        </form>

        <aside class="result-panel" id="result">
          <p class="result-label">Результат</p>
          <h2 id="result-title">Ожидает ввода</h2>
          <p id="result-probability">Вероятность покупки появится после запроса.</p>
        </aside>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
